global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: analytics-api
    static_configs:
      - targets: ["analytics-api:9102"]

  - job_name: warehouse-refresh
    static_configs:
      - targets: ["warehouse-refresh:9101"]

  - job_name: cloudflared
    static_configs:
      - targets: ["cloudflared:2000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: docker-exporter
    static_configs:
      - targets: ["docker-exporter:9323"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://gateway:8080/healthz
          - http://analytics-api:8000/v1/health
          - http://kong:8000/auth/v1/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
