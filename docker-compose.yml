services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
      - .env.local.runtime
    command: ["sh", "-lc", "bun install --frozen-lockfile && bun run dev --host 0.0.0.0 --port 8080"]
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

volumes:
  web_node_modules:
