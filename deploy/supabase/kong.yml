_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:9999/
    routes:
      - name: auth
        paths:
          - /auth/v1/
        strip_path: true
    plugins:
      - name: cors

  - name: rest
    url: http://rest:3000/
    routes:
      - name: rest
        paths:
          - /rest/v1/
        strip_path: true
    plugins:
      - name: cors

  - name: functions
    url: http://functions:9000/
    routes:
      - name: functions
        paths:
          - /functions/v1/
        strip_path: true
    plugins:
      - name: cors
