Listen 18083

<VirtualHost *:18083>
    ServerName 51.68.175.222

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ticketing-duckdb-ui.crt
    SSLCertificateKeyFile /etc/ssl/private/ticketing-duckdb-ui.key

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "18083"

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:14213/$1 [P,L]

    <Location />
        AuthType Basic
        AuthName "Ticketing DuckDB UI"
        AuthUserFile /etc/apache2/.htpasswd-ticketing-duckdb
        Require valid-user
    </Location>

    ProxyPass        / http://127.0.0.1:14213/
    ProxyPassReverse / http://127.0.0.1:14213/

    ErrorLog ${APACHE_LOG_DIR}/ticketing-duckdb-ui-error.log
    CustomLog ${APACHE_LOG_DIR}/ticketing-duckdb-ui-access.log combined
</VirtualHost>
