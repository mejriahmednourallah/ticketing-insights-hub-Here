sonar.projectName=Ticketing Insights Hub
sonar.sourceEncoding=UTF-8

sonar.sources=src,analytics_service,supabase/functions,ticketing_warehouse/models,ticketing_warehouse/macros,scripts
sonar.tests=src/test,analytics_service/tests
sonar.test.inclusions=src/**/*.{test,spec}.{ts,tsx},analytics_service/tests/test_*.py

sonar.exclusions=src/test/**,analytics_service/tests/**,**/node_modules/**,dist/**,coverage/**,analytics_service/**/__pycache__/**,ticketing_warehouse/target/**,ticketing_warehouse/dbt_packages/**,ticketing_warehouse/logs/**,**/*.duckdb,**/*.duckdb.wal
sonar.coverage.exclusions=supabase/functions/**,ticketing_warehouse/**,scripts/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.python.coverage.reportPaths=analytics_service/coverage.xml
sonar.python.version=3.12
