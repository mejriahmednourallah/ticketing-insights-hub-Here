# =============================================================================
# Kong declarative configuration for Supabase self-hosting
# =============================================================================
_format_version: "3.0"
_transform: true

services:
  # ── PostgREST (RESTful API) ────────────────────────────────────────────────
  - name: rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-all
        paths:
          - /rest/v1/
        strip_path: true
        methods: [GET, POST, PATCH, PUT, DELETE, OPTIONS]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PATCH", "PUT", "DELETE", "OPTIONS"]
          headers: ["*"]
          preflight_continue: false
          credentials: true

  # ── GoTrue (Auth) ──────────────────────────────────────────────────────────
  - name: auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-all
        paths:
          - /auth/v1/
        strip_path: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PATCH", "PUT", "DELETE", "OPTIONS"]
          headers: ["*"]
          preflight_continue: false
          credentials: true

  # ── Edge Runtime (Functions) ───────────────────────────────────────────────
  - name: functions
    url: http://supabase-edge-runtime:8081
    routes:
      - name: functions-all
        paths:
          - /functions/v1/
        strip_path: false
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PATCH", "PUT", "DELETE", "OPTIONS"]
          headers: ["*"]
          preflight_continue: false
          credentials: true

  # ── pg_meta (Database metadata) ────────────────────────────────────────────
  - name: meta
    url: http://supabase-meta:8080
    routes:
      - name: meta-all
        paths:
          - /pg/
        strip_path: true
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "OPTIONS"]
          headers: ["*"]
          preflight_continue: false
          credentials: true
