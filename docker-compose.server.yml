version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketing_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: '--locale=C'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing_web
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:5432}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-anon_key}
      VITE_ANALYTICS_API_URL: ${ANALYTICS_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-service_role_key}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    restart: unless-stopped
    command: sh -lc "bun install --frozen-lockfile && bun run dev --host 0.0.0.0 --port 8080"

  analytics-api:
    build:
      context: .
      dockerfile: analytics_service/Dockerfile
    container_name: ticketing_analytics_api
    environment:
      DUCKDB_PATH: /warehouse/warehouse-current.duckdb
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-}}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      ANALYTICS_AUTH_DISABLED: ${ANALYTICS_AUTH_DISABLED:-false}
      ANALYTICS_CORS_ORIGINS: ${ANALYTICS_CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    volumes:
      - duckdb_warehouse:/warehouse:ro
    expose:
      - "9102"
    depends_on:
      warehouse-refresh:
        condition: service_started
    restart: unless-stopped

  warehouse-refresh:
    build:
      context: .
      dockerfile: analytics_service/Dockerfile.worker
    container_name: ticketing_warehouse_refresh
    environment:
      WAREHOUSE_DIR: /warehouse
      WAREHOUSE_REFRESH_SECONDS: ${WAREHOUSE_REFRESH_SECONDS:-300}
      DBT_SUPABASE_HOST: postgres
      DBT_SUPABASE_PORT: 5432
      DBT_SUPABASE_USER: ${POSTGRES_USER:-postgres}
      DBT_SUPABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DBT_SUPABASE_DBNAME: ${POSTGRES_DB:-postgres}
      DUCKDB_EXTENSION_DIR: /tmp/duckdb_extensions
    volumes:
      - duckdb_warehouse:/warehouse
    expose:
      - "9101"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    profiles: ["monitoring"]
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER:-postgres}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: ["monitoring"]
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped

  docker-exporter:
    image: python:3.12-slim
    profiles: ["monitoring"]
    command: ["python", "/app/docker_exporter.py"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DOCKER_EXPORTER_PORT: "9323"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/docker/docker_exporter.py:/app/docker_exporter.py:ro
    expose:
      - "9323"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9323/healthz', timeout=2)\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: ["monitoring"]
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  # Background scheduler for Redmine ingestion
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing_scheduler
    environment:
      REDMINE_URL: ${REDMINE_URL:-https://maintenance.medianet.tn}
      REDMINE_API_KEY: ${REDMINE_API_KEY}
      REDMINE_PAGE_SIZE: ${REDMINE_PAGE_SIZE:-100}
      SUPABASE_URL: ${SUPABASE_URL:-http://postgres:5432}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDMINE_FIELD_TEAM: ${REDMINE_FIELD_TEAM}
      REDMINE_FIELD_TECHNOLOGY: ${REDMINE_FIELD_TECHNOLOGY}
      REDMINE_FIELD_NATURE: ${REDMINE_FIELD_NATURE}
      REDMINE_FIELD_INTERVENTION_TYPE: ${REDMINE_FIELD_INTERVENTION_TYPE}
      REDMINE_FIELD_RESOLVED_DATE: ${REDMINE_FIELD_RESOLVED_DATE}
      REDMINE_FIELD_SATISFACTION: ${REDMINE_FIELD_SATISFACTION}
      REDMINE_FIELD_SOURCE: ${REDMINE_FIELD_SOURCE}
      REDMINE_FIELD_CANAL: ${REDMINE_FIELD_CANAL}
      REDMINE_FIELD_SEGMENT_CLIENT: ${REDMINE_FIELD_SEGMENT_CLIENT}
      REDMINE_FIELD_REGION: ${REDMINE_FIELD_REGION}
      REDMINE_FIELD_REOPENED: ${REDMINE_FIELD_REOPENED}
      REDMINE_FIELD_SLA_PLAN: ${REDMINE_FIELD_SLA_PLAN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: |
      sh -c '
        echo "Scheduler started. Running ingest every 5 minutes..."
        while true; do
          echo "Ingestion run at $(date +\"%Y-%m-%d %H:%M:%S\")"
          bun run ingest:redmine:function 2>&1 || echo "Ingest failed, will retry"
          sleep 300
        done
      '

volumes:
  postgres_data:
  web_node_modules:
  duckdb_warehouse:
  prometheus_data:
  grafana_data:
